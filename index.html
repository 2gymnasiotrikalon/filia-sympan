<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Η Φιλία στο δικό μας Σύμπαν - 2ο Γυμνάσιο Τρικάλων</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { corePlugins: { preflight: false } }</script>
    <style>
        html, body { 
            height: 100%; margin: 0; padding: 0; background-color: #0a0a0a; 
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        #space-poetry-widget { 
            background-color: black; position: relative; overflow: hidden; 
            color: white; font-family: ui-sans-serif, system-ui, sans-serif;
        }
        .stars-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #020617 0%, #000000 100%); z-index: 0;
        }
        .star {
            position: absolute; background: white; border-radius: 50%; opacity: 0.5;
            animation: twinkle 3s infinite ease-in-out;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 0.8; transform: scale(1.2); } }
        @keyframes float-slow { 0%, 100% { transform: translateY(0px) translateX(-2px); } 50% { transform: translateY(-8px) translateX(2px); } }
        @keyframes float-delayed { 0%, 100% { transform: translateY(0px) translateX(2px) rotate(-1deg); } 50% { transform: translateY(8px) translateX(-2px) rotate(1deg); } }
        .animate-float-slow { animation: float-slow 8s ease-in-out infinite; }
        .animate-float-delayed { animation: float-delayed 10s ease-in-out infinite; }
        #content-wrapper { transition: opacity 0.5s, transform 0.5s; z-index: 10; }
        .fade-out { opacity: 0; transform: scale(0.95); }
        h1 { color: #facc15 !important; text-shadow: 0 2px 4px rgba(0,0,0,0.5); font-weight: normal; }
        h2 { color: #ffffff !important; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .nav-dot { transition: all 0.3s ease; cursor: pointer; }
    </style>
</head>
<body>

<div id="space-poetry-widget" class="w-[96vw] md:w-[90vw] max-w-5xl mx-auto flex flex-col items-center justify-center shadow-2xl relative h-[90vh] min-h-[560px] max-h-[700px] md:h-[580px] rounded-[1.5rem] md:rounded-[2rem] border border-white/10">
    
    <div id="yt-player-container" style="position:absolute; width:1px; height:1px; opacity:0;"><div id="yt-player"></div></div>

    <div class="absolute top-4 md:top-6 left-1/2 -translate-x-1/2 z-30 flex items-center gap-2 md:gap-3 bg-white/10 backdrop-blur-md px-3 md:px-4 py-1.5 md:py-2 rounded-full border border-white/20 shadow-lg w-max">
        <button id="music-btn" class="text-white hover:text-yellow-400 focus:outline-none transition-colors flex items-center justify-center p-0 bg-transparent border-0 cursor-pointer">
            <svg id="play-icon" class="w-4 h-4 md:w-5 md:h-5 text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4l12 6-12 6z"/></svg>
            <svg id="pause-icon" class="w-4 h-4 md:w-5 md:h-5 text-yellow-400 hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M5 4h3v12H5zm6 0h3v12h-3z"/></svg>
        </button>
        <span class="text-yellow-400 text-[8px] md:text-[10px] uppercase tracking-widest truncate font-medium">Ο ΜΙΚΡΟΣ ΠΡΙΓΚΙΠΑΣ - ΕΥΑΝΘΙΑ ΡΕΜΠΟΥΤΣΙΚΑ</span>
    </div>

    <button id="prev-btn" class="absolute z-50 bg-white/10 backdrop-blur-[8px] border border-white/20 text-white rounded-full cursor-pointer transition-all flex items-center justify-center hover:bg-white/20 hover:border-[#facc15] hover:text-[#facc15] p-2 md:p-3 top-[40%] md:top-[50%] -translate-y-1/2 left-2 md:left-6 opacity-80 md:opacity-100">
        <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </button>
    <button id="next-btn" class="absolute z-50 bg-white/10 backdrop-blur-[8px] border border-white/20 text-white rounded-full cursor-pointer transition-all flex items-center justify-center hover:bg-white/20 hover:border-[#facc15] hover:text-[#facc15] p-2 md:p-3 top-[40%] md:top-[50%] -translate-y-1/2 right-2 md:right-6 opacity-80 md:opacity-100">
        <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    </button>

    <div class="stars-container" id="stars"></div>

    <div id="content-wrapper" class="relative z-10 w-full flex flex-col md:flex-row items-center justify-center gap-5 md:gap-16 min-w-0 mt-4 md:mt-0">
        <div class="shrink-0 w-48 h-48 md:w-64 md:h-64 relative order-1 flex justify-center items-center">
            <div class="relative group animate-float-slow w-full h-full">
                <div class="absolute -inset-4 bg-yellow-500/10 rounded-full blur-2xl"></div>
                <div class="w-full h-full rounded-2xl md:rounded-[2rem] overflow-hidden border-2 border-white/20 shadow-xl bg-gray-900 flex items-center justify-center relative">
                    <img id="poem-img" src="" class="w-full h-full object-cover relative z-10 transition-opacity duration-300">
                </div>
            </div>
        </div>

        <div id="poem-text-block" class="shrink-0 w-[calc(100%-6rem)] md:w-[480px] lg:w-[500px] h-[300px] md:h-[380px] order-2 min-w-0">
            <div class="relative animate-float-delayed w-full h-full">
                <div class="bg-white/10 backdrop-blur-xl px-4 md:px-8 py-4 md:py-6 rounded-[1.5rem] md:rounded-[2rem] border border-white/20 shadow-xl w-full h-full flex flex-col box-border">
                    <h2 id="poem-category" class="text-[9px] md:text-[10px] uppercase tracking-[0.2em] font-bold mb-1 shrink-0"></h2>
                    <div class="min-h-[40px] md:min-h-[50px] flex items-center shrink-0">
                        <h1 id="poem-title" class="text-base md:text-xl lg:text-2xl font-serif leading-tight m-0 line-clamp-2"></h1>
                    </div>
                    <div class="w-full h-[1px] bg-white/20 my-2 md:my-3 shrink-0"></div>
                    <div id="poem-scroll-container" class="flex-1 pr-1 md:pr-3 overflow-visible">
                        <p id="poem-text" class="text-[11px] md:text-[14px] lg:text-[15px] text-blue-50 font-light italic leading-relaxed whitespace-pre-line m-0 pb-1"></p>
                    </div>
                    <div class="mt-auto text-right shrink-0">
                        <p id="poem-author" class="text-yellow-500 font-serif text-sm md:text-lg m-0"></p>
                        <p id="author-label" class="text-white/40 text-[8px] mt-1 tracking-widest uppercase m-0"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="nav-dots" class="absolute bottom-4 md:bottom-6 left-1/2 -translate-x-1/2 flex justify-center items-center gap-1.5 md:gap-2 z-20"></div>
</div>

<script>
    let player, currentIndex = 0, autoPlayTimer, isAnimating = false;
    const POEMS = [
      {title: "Η φιλία στο δικό μας σύμπαν:<br>Ψηφιακή συλλογή ποιημάτων", text: "2ο Γυμνάσιο Τρικάλων\nΣχολικό έτος 2025-26\nΤμήματα Β1 & Β2\n\nΜια συνεργατική δημιουργία των μαθητών μας για την αξία της φιλίας.", author: "", label: "", image: "https://drive.google.com/thumbnail?id=1bGjMZQklRTZWHGIgy1tHRlXFF-DX2p3V&sz=w800", duration: 12000},
      {title: "Φιλία", text: "Σε κάθε βόλτα η καρδιά ξανοίγει,\nμε γέλια που διώχνουν κάθε σύννεφο βαρύ,\nεκεί που η εμπιστοσύνη ρίζες έχει πήξει,\nκι η φιλία ανθίζει σπάνια και γερή.\n\nΜε σεβασμό στα «θέλω» και στα «πρέπει»,\nαναμνήσεις χτίζουμε σε κάθε μας στιγμή,\nο φίλος με τα μάτια της ψυχής σε βλέπει,\nπάντα ειλικρινή και στο πλευρό σου μια ζωή.", author: "Α.Π.", label: "ΜΑΘΗΤΗΣ/ΤΡΙΑ", image: "https://drive.google.com/thumbnail?id=1Zkwz6rdWu278wIOaHMBjxXMiYUtVFN0I&sz=w800", duration: 20000},
      {title: "Ένα ποίημα για την φιλία", text: "Φιλία, είναι το γέλιο που διώχνω\nμακριά την βροχή, το χέρι που\nσε πιάνει πριν κάθε ελπίδα χαθεί.\nΣτα εύκολα και στα δύσκολα,\nστέκει εκεί πιστή, σαν φάρος\nπου φωτίζει όλη μας τη ζωή.\nΣαν ήλιος που περιμένει μετά\nαπό κάθε βροχή.", author: "Ε.Π.", label: "ΜΑΘΗΤΗΣ/ΤΡΙΑ", image: "https://drive.google.com/thumbnail?id=1AtsSgeJGQNch2TdyHlOlydVNhkGFHuu7&sz=w800", duration: 18000},
      {title: "Σιωπηλές στιγμές", text: "Η φιλία είναι φως σε σιωπηλές στιγμές,\nένα χέρι που μένει όταν όλα φεύγουν.\nΓέλιο που μοιράζεται, \nπόνος που μικραίνει\nκαι μια καρδιά που λέει «είμαι εδώ»\nχωρίς να ρωτά.", author: "Δ.Μ.", label: "ΜΑΘΗΤΗΣ/ΤΡΙΑ", image: "https://drive.google.com/thumbnail?id=1KM5Pp0PihcH3EHsvnpFNZyBFoxFk3eTb&sz=w800", duration: 16000},
      {title: "Το χτύπημα της καρδιάς", text: "Ενώ στην ζωή μου υπάρχει μονοτονία \nξαφνικά χτυπάς εσύ την πόρτα της καρδιάς μου \nκαι μου δημιουργείς απορία.\n\nΠοιος είσαι εσύ; Ποιος είσαι συ που θες να με γνωρίσεις; \nΛύσε μου την απορία με δυο-τρεις απαντήσεις.\n\nΟ καιρός περνά ταχύτατα μην τον χάσεις \nέναν φίλο στο πλευρό σου πάντα να έχεις!", author: "Ε.Γ. & Ν.Κ.", label: "ΜΑΘΗΤΗΣ/ΤΡΙΑ", image: "https://drive.google.com/thumbnail?id=1GDzaVHnX6f5c3tCVXeynpih0n8Ly0E_l&sz=w800", duration: 25000},
      {title: "Φίλος για πάντα", text: "Ένας φίλος είναι ο θησαυρός,\nπου λάμπει μες στο σκοτάδι.\nΕίναι το στήριγμα το γερό,\nσε κάθε μας σημάδι.\n\nΜε την αγάπη οδηγό,\nχτίζουμε κόσμους νέους,\nκρατώντας πάντα ζωντανό,\nτον δεσμό μας τον ωραίο.", author: "Σ.Κ.", label: "ΜΑΘΗΤΗΣ/ΤΡΙΑ", image: "https://drive.google.com/thumbnail?id=1RX5lKvMd7Sdi1OcejvlksXPdkCzRcj98&sz=w800", duration: 18000},
      {title: "Η φιλία στη ζωή μας", text: "Η χαρά στις εύκολες στιγμές\nη συμπόνια στις βασανιστικές στιγμές\nη καθοδήγηση στις μπερδεμένες αποφάσεις,\nτο πιο σπουδαίο πράγμα στο κόσμο\nαυτό είναι η φιλία.\n\nΗ ζεστασιά μιας αγκαλιάς\nΗ προσφορά μιας ουσιαστικής κουβέντας\nαυτό είναι η φιλία.", author: "Μ.Μ.", label: "ΜΑΘΗΤΗΣ/ΤΡΙΑ", image: "https://drive.google.com/thumbnail?id=1vKwlMQFjEZeNZ216UYOq3UagmDTUe3Ry&sz=w800", duration: 18000},
      {title: "Φιλία", text: "Πριν σε συναντήσω όλα ήταν σιωπηλά,\nοι λέξεις άδειες τα όνειρα μακριά.\nΗ καρδιά μου έρημος η ζωή βαριά,\nκι ο κόσμος δίχως φως, τα πάντα σκοτεινά.\n\nΑφού σε συνάντησα όλα γίναν μαγικά,\nοι λέξεις γίναν πράξεις, η ψυχή μίλησε πια,\nσαν τριαντάφυλλο που ανθίζει στην ερημιά.\n\nΤώρα σε κοιτώ και γελώ ξανά, είσαι το θαύμα,\nπου φωτίζει τη ζωή μου πια.", author: "Χ.Π.", label: "ΜΑΘΗΤΗΣ/ΤΡΙΑ", image: "https://drive.google.com/thumbnail?id=19BKhmO-nn3HkaA6cfOT8uGPYI-0sf90x&sz=w800", duration: 22000},
      {title: "Ο αέρας μιας φιλίας", text: "Ξαφνικά μια μέρα \nήρθες εσύ σαν το αέρα\nΤα προβλήματα μου πήρες \nκαι τα πήγες πέρα πέρα\nΉρθες και έφερες \nστη ζωή μου \nευτυχία και γαλήνη.\n\nΣαν τριαντάφυλλο \nείναι η φιλία μας \nπου συνεχώς ανθίζει\nμε αγάπη και φροντίδα \nη ζωή μας γεμίζει.", author: "Η.Κ. & Α.Γ.", label: "ΜΑΘΗΤΗΣ/ΤΡΙΑ", image: "https://drive.google.com/thumbnail?id=1DcNy9ltmBBqIouaGfZ3OCmrgyZVrVQYQ&sz=w800", duration: 20000},
      {title: "Ένα ποίημα για τη φιλία", text: "Φιλία είναι να ξέρεις\nπως κάποιος σε καταλαβαίνει,\nχωρίς εξηγήσεις,\nσε διορθώνει\nχωρίς να σε μειώνει\nκαι στέκεται σταθερός\nόταν ο κόσμος αλλάζει ρυθμό,\nδιάθεση, κατεύθυνση,\nαφήνοντας χώρο να μεγαλώνεις\nόπως είσαι, αληθινά,\nχωρίς φόβο απώλειας\nή περιττούς ρόλους.", author: "Μ.Λ.", label: "ΜΑΘΗΤΗΣ/ΤΡΙΑ", image: "https://drive.google.com/thumbnail?id=1HUY7lnZyO54MAgwyFTBCscZkG18rRXMa&sz=w800", duration: 25000},
      {title: "Ο κήπος με τα τριαντάφυλλα", text: "Ένα αγόρι, ένας πρίγκιπας μικρός\nσυνάντησε ένα όμορφο λουλούδι.\nΠοτέ του δεν είχε δει σαν αυτό,\nΌμως, ένας κήπος με τριαντάφυλλα\nβρέθηκε μπροστά του.\nΌλα ίδια με το δικό του.\nΣτεναχώρια τον έπιασε μεγάλη.\nΑλλά απ' το πουθενά, εμφανίστηκε μια αλεπού.\nΗ οποία του είπε όλα τα μυστικά για τη φιλία.\nΤου εξήγησε για το ημέρωμα.", author: "Μ.Κ. & Ε.Π.", label: "ΜΑΘΗΤΗΣ/ΤΡΙΑ", image: "https://drive.google.com/thumbnail?id=16dJPQCngi8PpmSy97RJxhDiPaWCdrp_Q&sz=w800", duration: 25000},
      {title: "Το στήριγμά μας", text: "Με το χέρι στην καρδιά\nσκέφτομαι βαθιά\nτον αγαπημένο μου το φίλο\nτο στήριγμά μου στη ζωή.\n\nΗ φιλία δένει πάντα\nτων ανθρώπων τις ζωές\nη αλήθεια στη φιλία\nείναι η πυξίδα\nγια να δείχνει τις χαρές.", author: "Γ.Π. & Γ.Λ.", label: "ΜΑΘΗΤΗΣ/ΤΡΙΑ", image: "https://drive.google.com/thumbnail?id=1jHFp6qlnYLb3f1ZoF6DcHvGpwFAZUZPb&sz=w800", duration: 18000},
      {title: "Το σπάνιο λουλούδι", text: "Σαν το πιο σπάνιο λουλούδι στον κήπο της ζωής,\nη φιλία ανθίζει, δίχως να ζητά τιμή.\nΔεν είναι λόγια, αλλά πράξεις και σιωπή,\nένα χέρι σταθερό, όταν η νύχτα είναι σκοτεινή.\n\nΣτις χαρές γελάμε δυνατά,\nμα στις λύπες είναι ο φίλος εκεί \nσαν σωστός συνοδοιπόρος.\nΕίναι ένας καθρέπτης που δείχνει \nποιοι πραγματικά είμαστε.", author: "Ε.Μ.", label: "ΜΑΘΗΤΗΣ/ΤΡΙΑ", image: "https://drive.google.com/thumbnail?id=1rGyeA-MLXFLjN_M2lgeABe1v3sqX1soA&sz=w800", duration: 22000},
      {title: "Η αθάνατη φιλία", text: "Φιλία λέξη ιερή\nφιλία λέξη θεία που γράφεται\nμες τις καρδιές και\nόχι στα βιβλία.\n\nΦιλία λέξη αθάνατη\nφιλία λέξη θεία\nπου γράφεται μες στις ζωές\nκαι όχι στα αρχεία.", author: "Χ.Μ.", label: "ΜΑΘΗΤΗΣ/ΤΡΙΑ", image: "https://drive.google.com/thumbnail?id=147fbtfNF3dAGvWCsFt-07wqLjvhcW534&sz=w800", duration: 15000},
      {title: "Ο φίλος", text: "Όταν τον φίλο σου πονάς\nη κουβέντα σου \nδεν σε αφήνει να κοιμηθείς\nκαι όταν ο φίλος\nσου στο πλάι σου \nσε συμπονάει, νιώθεις \nπως αυτή η στιγμή \nσε ταξιδεύει. \n\nΗ φιλία τόσο σημαντική \nόπου την ψάξεις\nόπου την σκάψεις \nσαν αυτήν δεν θα υπάρξει.", author: "Δ.Κ.", label: "ΜΑΘΗΤΗΣ/ΤΡΙΑ", image: "https://drive.google.com/thumbnail?id=1IBrjSwRT7PYXDKtPjpEQ-meyp9VrKlXc&sz=w800", duration: 18000},
      {title: "Ο μικρός πρίγκιπας", text: "Ο Μικρός Πρίγκιπας είχε ένα λουλούδι,\nένα τριαντάφυλλο μοναδικό στον κόσμο.\nΝόμιζε πως ήταν πλούσιος,\nότι ήταν το μοναδικό στον κόσμο\nκαι πέφτοντας χάμω στο γρασίδι, παραδέχτηκε μια αλήθεια.\nΤου έδωσε ένα πολύ σημαντικό μάθημα,\nπώς είναι να έχεις την ανάγκη του άλλου,\nπώς είναι να δημιουργείς δεσμό με άλλους.\nΑυτό που έχει σημασία σε μία φιλία\nείναι να δεις την καρδιά του άλλου,\nη εξωτερική εμφάνιση δεν έχει καμία απολύτως σημασία.", author: "Μ.Λ. & Α.Κ.", label: "ΜΑΘΗΤΗΣ/ΤΡΙΑ", image: "https://drive.google.com/thumbnail?id=1sKQBulWvgsdRnYgUkmTE_TUellEcLXoe&sz=w800", duration: 30000},
      {title: "Ένας πιστός φίλος", text: "Η φιλία είναι δώρο ακριβό\nστον άνθρωπο σημαντικό.\nΤο να έχεις έναν φίλο πιστό\nείναι κάτι μοναδικό.\n\nΣτις δυσκολίες στήριγμα,\nστα γέλια συντροφιά,\nδιώχνει μακριά τα σύννεφα\nκαι κάθε μοναξιά.\n\n«Φιλία δυνατή,\nζωή φωτεινή.\nΜαζί στα εύκολα\nμαζί και στα δύσκολα!»", author: "Χ.Δ. & Ν.Γ.", label: "ΜΑΘΗΤΗΣ/ΤΡΙΑ", image: "https://drive.google.com/thumbnail?id=1_GSj7l4SDd6kVnQPXKcxHnqj3BwL-p2Q&sz=w800", duration: 40000},
      {title: "Η έννοια της φιλίας", text: "Φιλία λέξη ιερή\nμε έννοια μεγάλη\nπου πρέπει βαθιά\nμες την καρδιά\nνα την φυλάμε όλοι!\n\nΟ φίλος είναι κι αδερφός\nποτέ μη το ξεχάσεις,\nγι' αυτό γερά να τον κρατάς\nποτέ σου μην τον χάσεις!\n\nΜεγάλη τύχη στη ζωή\nείναι η αγνή φιλία,\nαλλά στη σήμερον την εποχή,\nτη βρίσκεις με δυσκολία!", author: "Κ.Κ.", label: "ΜΑΘΗΤΗΣ/ΤΡΙΑ", image: "https://drive.google.com/thumbnail?id=1h7n9tYgzcUl7O0hdxiYr-A_AATFNK0j5&sz=w800", duration: 28000},
      {title: "Η φιλία", text: "Η φιλία θέλει αυτοθυσία,\nΑφοσίωση, αξιοπιστία.\nΈνας φίλος πρέπει να 'ναι σωστός,\nτίμιος, ξεχωριστός.\n\nΕάν ποτέ τον συναντήσεις,\nπροσπάθησε να τον κρατήσεις.\nΓιατί η αληθινή φιλία\nείναι αυτή που έχει αξία.", author: "Ε.Η.", label: "ΜΑΘΗΤΗΣ/ΤΡΙΑ", image: "https://drive.google.com/thumbnail?id=1Z3ZOEW__p0QsqGmJaBUwDT7LTFh8Of2E&sz=w800", duration: 15000},
      {title: "Η αγάπη της φιλίας", text: "Η φιλία είναι στήριγμα\nΗ φιλία είναι αγάπη\nΠου ζεσταίνει την ψυχή\nΚαι γιατρεύει όλα τα λάθη.\n\nΗ φιλία είναι στήριγμα\nΗ φιλία είναι αγάπη\nΔεν ζητά αντάλλαγμα\nΔεν ζητά συνάλλαγμα.", author: "Θ.Ν", label: "ΜΑΘΗΤΗΣ/ΤΡΙΑ", image: "https://drive.google.com/thumbnail?id=1EMTCGuH8vbZ4PrnQ_UYAJZEQOQBXByj-&sz=w800", duration: 15000},
      {title: "Δεσμοί φιλίας", text: "Η δικιά σου η φιλία μου προσφέρει ελευθερία,\nη δικιά μου η φιλία σου προσφέρει πειθαρχία,\nαυτό κάνει η φιλία\nμας ενώνει όλους\nκαι όλοι εμείς μαζί ακουμπάμε\nτους ουρανούς.", author: "Φ.Ν", label: "ΜΑΘΗΤΗΣ/ΤΡΙΑ", image: "https://drive.google.com/thumbnail?id=1SXAkGEaMeEB1fjkl-fjyl9J_tZKAkkP-&sz=w800", duration: 25000},
      {title: "Ευχαριστούμε για την προσοχή σας!", text: "Ποιήματα: μαθητές & μαθήτριες Β1 & Β2\nΕικόνες ΤΝ: μαθητές & μαθήτριες Β2\nΖωγραφιές: Έρλα Παπάι (Β1) και Μαργαρίτα Λαμπρογιώργου (Β2)\nΥπεύθυνες δράσης: Σοφία Κατσαρού & Ελένη Ποζιού\nΨηφιακός εμπλουτισμός – Οπτικοποίηση περιεχομένου: Ελένη Ποζιού & Ευαγγελία Τριάντου", author: "2ο Γυμνάσιο Τρικάλων", label: "Σχολικό έτος 2025-26", image: "https://drive.google.com/thumbnail?id=1g7JNTrDdKXjQ_jT9Qfvc-PtX78ulTtUD&sz=w800", duration: 20000}
    ];

    window.onYouTubeIframeAPIReady = function() {
        player = new YT.Player('yt-player', {
            height: '1', width: '1', videoId: 'fqkI-3bOreg',
            playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': 'fqkI-3bOreg', 'playsinline': 1 },
            events: {
                'onReady': (e) => { e.target.setVolume(30); },
                'onStateChange': (e) => {
                    const isPlaying = (e.data === YT.PlayerState.PLAYING);
                    document.getElementById('play-icon').classList.toggle('hidden', isPlaying);
                    document.getElementById('pause-icon').classList.toggle('hidden', !isPlaying);
                }
            }
        });
    };

    document.getElementById('music-btn').onclick = () => {
        if (player.getPlayerState() === YT.PlayerState.PLAYING) player.pauseVideo(); else player.playVideo();
    };

    function goToPoem(index, force = false) {
        if (!force && (index === currentIndex || isAnimating)) return;
        isAnimating = true; currentIndex = index;
        const wrapper = document.getElementById('content-wrapper');
        wrapper.classList.add('fade-out');
        clearTimeout(autoPlayTimer);
        
        setTimeout(() => {
            const poem = POEMS[currentIndex];
            document.getElementById('poem-title').innerHTML = poem.title;
            const pText = document.getElementById('poem-text');
            pText.innerText = poem.text;
            document.getElementById('poem-author').innerText = poem.author ? "— " + poem.author : "";
            document.getElementById('author-label').innerText = poem.label;
            
            const img = document.getElementById('poem-img');
            img.style.opacity = '0';
            img.onload = () => img.style.opacity = '1';
            img.src = poem.image;

            createDots();
            wrapper.classList.remove('fade-out');
            setTimeout(() => { isAnimating = false; startAutoPlay(); }, 500);
        }, 500);
    }

    function createDots() {
        const container = document.getElementById('nav-dots');
        container.innerHTML = '';
        POEMS.forEach((_, i) => {
            const d = document.createElement('div');
            d.className = `nav-dot rounded-full transition-all ${i === currentIndex ? 'h-1.5 w-4 md:h-2 md:w-6 bg-yellow-400' : 'h-1.5 w-1.5 md:h-2 md:w-2 bg-white/30'}`;
            d.onclick = () => goToPoem(i, true);
            container.appendChild(d);
        });
    }

    function startAutoPlay() {
        clearTimeout(autoPlayTimer);
        autoPlayTimer = setTimeout(() => goToPoem((currentIndex + 1) % POEMS.length), POEMS[currentIndex].duration);
    }

    document.getElementById('prev-btn').onclick = () => goToPoem((currentIndex - 1 + POEMS.length) % POEMS.length, true);
    document.getElementById('next-btn').onclick = () => goToPoem((currentIndex + 1) % POEMS.length, true);

    const stars = document.getElementById('stars');
    for(let i=0; i<80; i++) {
        let s = document.createElement('div');
        s.className = 'star';
        s.style.top = Math.random()*100+'%'; s.style.left = Math.random()*100+'%';
        s.style.width = s.style.height = Math.random()*3+'px';
        s.style.animationDelay = Math.random()*5+'s';
        stars.appendChild(s);
    }

    var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);
    createDots(); goToPoem(0, true);
</script>
