    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* CSS για πλήρες κεντράρισμα - Σκούρο γκρι φόντο πίσω από το μαύρο widget */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            background-color: #0a0a0a; 
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #space-poetry-widget { 
            background-color: black; position: relative; overflow: hidden; 
            color: white; font-family: ui-sans-serif, system-ui, sans-serif;
        }

        .stars-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #020617 0%, #000000 100%); z-index: 0;
        }
        .star {
            position: absolute; background: white; border-radius: 50%; opacity: 0.5;
            animation: twinkle 3s infinite ease-in-out;
        }
        
        @keyframes twinkle { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 0.8; transform: scale(1.2); } }
        
        /* Ισορροπημένη αιώρηση αριστερά-δεξιά για να μην "φεύγει" από το κέντρο */
        @keyframes float-slow { 0%, 100% { transform: translateY(0px) translateX(-3px); } 50% { transform: translateY(-8px) translateX(3px); } }
        @keyframes float-delayed { 0%, 100% { transform: translateY(0px) translateX(2px) rotate(-1deg); } 50% { transform: translateY(8px) translateX(-2px) rotate(1deg); } }
        
        .animate-float-slow { animation: float-slow 8s ease-in-out infinite; }
        .animate-float-delayed { animation: float-delayed 10s ease-in-out infinite; }
        
        #content-wrapper { transition: opacity 0.5s, transform 0.5s; z-index: 10; }
        .fade-out { opacity: 0; transform: scale(0.95); }

        h1 { color: #facc15 !important; text-shadow: 0 2px 4px rgba(0,0,0,0.5); font-weight: normal; }
        h2 { color: #ffffff !important; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        p, span { text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        .nav-dot { transition: all 0.3s ease; cursor: pointer; }
        .nav-dot:hover { background-color: rgba(255, 255, 255, 0.8) !important; }

        /* ΣΤΑΘΕΡΑ ΒΕΛΗ */
        .nav-arrow {
            position: absolute; transform: translateY(-50%); z-index: 50;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2); color: white;
            border-radius: 9999px; cursor: pointer;
            transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;
        }
        .nav-arrow:hover { background: rgba(255, 255, 255, 0.2); border-color: #facc15; color: #facc15; }
        
        /* Στον υπολογιστή παραμένουν στο κέντρο (50%) */
        @media (min-width: 768px) {
            .nav-arrow { padding: 0.75rem; top: 50% !important; }
            .arrow-left { left: 1.5rem; } .arrow-right { right: 1.5rem; }
        }
        /* Στο κινητό ανεβαίνουν βίαια στο ύψος της εικόνας (26%) */
        @media (max-width: 768px) {
            .nav-arrow { padding: 0.5rem; opacity: 0.8; top: 26% !important; }
            .arrow-left { left: 0.5rem; } .arrow-right { right: 0.5rem; }
        }

        #yt-player-container { position: absolute; width: 2px; height: 2px; bottom: 0; left: 0; opacity: 0.01; pointer-events: none; overflow: hidden; }
        
        .custom-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: #facc15 transparent;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #facc15; border-radius: 10px; }
    </style>
</head>
